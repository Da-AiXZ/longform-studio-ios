name: LongformStudio
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    ENABLE_USER_SCRIPT_SANDBOXING: true
packages:
  NovelCore:
    path: .
targets:
  LongformStudio:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - Resources/Info.plist
    dependencies:
      - package: NovelCore
        product: NovelCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ainovel.longformstudio
        PRODUCT_NAME: LongformStudio
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGNING_ALLOWED: true
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - LongformStudioTests
        - LongformStudioUITests
      gatherCoverageData: true
  LongformStudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    dependencies:
      - target: LongformStudio
      - package: NovelCore
        product: NovelCore
  LongformStudioUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AppUITests
    dependencies:
      - target: LongformStudio
